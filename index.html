<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue Learn</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="index.css">
    <script src="./index.js" defer></script>
  </head>

  <body>
    <div id="app">

      <h1 :class="msg_cls">{{ msg }}</h1>

      <h1>Count is {{ count }}</h1>
      <button @click="increment">+</button>
      <button @click="decrement">-</button>
      <br><br><br><br>

      <input v-model="text" id="text-input">
      <p>{{ text }}</p>
      <br>

      <h1 v-if="awesome"> Vue is awesomee! </h1>
      <h1 v-else="awesome"> Not Good</h1>
      <button @click="toggleawesome"> Toggle Awesome</button>
      <br><br>

      <form @submit.prevent="addTodo">
        <input v-model="newTodo" required placeholder="new todo">
        <button>Add Todo</button>
      </form>

      <ul>
        <li v-for="todo in filteredTodos" :key="todo.id">
          <input type="checkbox" v-model="todo.done">
          <span :class="{done: todo.done}">{{ todo.text }}</span>
          <button @click="rmTodo(todo)">X</button>
        </li>
      </ul>
      <button @click="hideCompleted = !hideCompleted">
        {{ hideCompleted ? 'Show Completed' : 'Hide Completed' }}
      </button>
      <br><br>

      <p :class="msg_cls" ref="p_ref"> Nihao </p>

      <div>
        <p>Todo Id is {{ todoID }}</p>
        <button @click="todoID++" :disabled="!todoData">Fetch next data</button>
        <p v-if="!todoData">Loading ...</p>
        <pre v-else>{{todoData}}</pre>

      </div>

    </div>

  </body>

</html>
